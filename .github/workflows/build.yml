name: Build & Release

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Build platform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - mac
          - windows
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-mac:
    if: ${{ inputs.platform == 'mac' || inputs.platform == 'all' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build macOS (x64 + arm64)
        run: npx electron-builder --mac --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PTCG-Simulator-macOS
          path: |
            dist/*.zip
            dist/*.dmg

  build-windows:
    if: ${{ inputs.platform == 'windows' || inputs.platform == 'all' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Windows
        run: npx electron-builder --win --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PTCG-Simulator-Windows
          path: dist/*.exe

  release:
    needs: [build-mac, build-windows]
    if: ${{ always() && (needs.build-mac.result == 'success' || needs.build-windows.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: images
          sparse-checkout-cone-mode: true

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package images separately
        run: |
          cd images
          zip -r -9 ../artifacts/PTCG-Card-Images.zip . -x ".*"

      - name: List release files
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: PTCG Simulator v${{ inputs.version }}
          body: |
            ## PTCG 寶可夢卡牌模擬器 v${{ inputs.version }}

            ### 📥 下載說明

            | 檔案 | 說明 |
            |------|------|
            | `PTCG-Simulator-Portable-*.exe` | **Windows** — 直接執行 |
            | `*-x64.zip` | **macOS Intel** — 解壓後執行 |
            | `*-arm64.zip` | **macOS Apple Silicon (M1/M2/M3/M4)** — 解壓後執行 |
            | `PTCG-Card-Images.zip*` | **卡片圖片（選用）** — 離線使用用 |

            ### 🖼️ 關於卡片圖片
            - 程式預設使用**線上圖片**，不需要額外下載即可正常使用
            - 如果想要**離線使用**，下載 `PTCG-Card-Images.zip` 並解壓到程式同目錄的 `images` 資料夾

            ### ⚠️ 注意事項
            - macOS 首次開啟需要：**右鍵 → 打開 → 確認打開**
            - Windows 可能跳出 SmartScreen 警告，點擊「仍要執行」即可
          files: artifacts/**/*
          draft: false
          prerelease: false
