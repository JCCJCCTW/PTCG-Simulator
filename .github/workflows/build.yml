name: Build & Release

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Build platform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - mac
          - windows
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        default: '1.3.0'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-mac:
    if: ${{ inputs.platform == 'mac' || inputs.platform == 'all' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build macOS (x64 + arm64)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --mac --publish never

      - name: Ad-hoc sign, add launcher, and repackage
        run: |
          for zipfile in dist/*.zip; do
            [ -f "$zipfile" ] || continue
            tmpdir=$(mktemp -d)
            unzip -q "$zipfile" -d "$tmpdir"
            app=$(find "$tmpdir" -name "*.app" -maxdepth 2 -type d | head -1)
            appname=$(basename "$app" 2>/dev/null || echo "PTCG Simulator.app")
            if [ -n "$app" ]; then
              xattr -cr "$app" 2>/dev/null || true
              codesign --force --deep -s - "$app" 2>/dev/null || true
            fi
            # 建立一鍵啟動腳本（雙擊即可，不需手動開終端機）
            cat > "$tmpdir/首次啟動請雙擊我.command" << 'SCRIPT'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          APP="$(find "$DIR" -name "*.app" -maxdepth 1 -type d | head -1)"
          if [ -z "$APP" ]; then
            echo "找不到 .app 檔案，請確認 .app 和此腳本在同一個資料夾"
            read -p "按 Enter 關閉..."
            exit 1
          fi
          echo "正在解除 macOS 安全限制..."
          xattr -cr "$APP" 2>/dev/null
          echo "正在啟動 $(basename "$APP")..."
          open "$APP"
          echo "完成！之後可以直接雙擊 .app 開啟，不需要再執行此腳本。"
          sleep 2
          SCRIPT
            chmod +x "$tmpdir/首次啟動請雙擊我.command"
            rm "$zipfile"
            cd "$tmpdir" && zip -r -q -y "$OLDPWD/$zipfile" . && cd "$OLDPWD"
            rm -rf "$tmpdir"
          done

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PTCG-Simulator-macOS
          path: |
            dist/*.zip
            dist/*.dmg

  build-windows:
    if: ${{ inputs.platform == 'windows' || inputs.platform == 'all' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Windows
        run: npx electron-builder --win --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PTCG-Simulator-Windows
          path: dist/*.exe

  release:
    needs: [build-mac, build-windows]
    if: ${{ always() && (needs.build-mac.result == 'success' || needs.build-windows.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: images
          sparse-checkout-cone-mode: true

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package images separately
        run: |
          cd images
          zip -r -9 ../artifacts/PTCG-Card-Images.zip . -x ".*"

      - name: List release files
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: PTCG Simulator v${{ inputs.version }}
          body: |
            ## PTCG 寶可夢卡牌模擬器 v${{ inputs.version }}

            ### ✨ v1.3.0 更新內容

            #### 修復
            - **多人模式重抽（Mulligan）修復**：修復對手端無限重抽的問題（evolutionStage 未同步導致無法判斷基礎寶可夢）
            - **重抽結果顯示**：起手成功時不再顯示多餘的「起手成功」提示，僅在有重抽時顯示次數
            - **再來一局重抽顯示**：修復再來一局後不顯示對手重抽次數的問題
            - **重抽安全上限**：新增 MAX_MULLIGAN (50) 防止極端情況下的無限重抽迴圈

            #### 改善
            - **視窗標題保持不變**：開啟牌組編輯器時，主視窗標題不再變為「牌組編輯器」，始終顯示「PTCG 寶可夢卡牌模擬器」
            - **卡片圖片本地優先**：卡片圖片預設優先從 deck-builder-data 本地圖片載入，找不到才使用線上圖片網址

            ---

            <details>
            <summary>v1.2.0 更新內容</summary>

            #### 新功能
            - **起手重抽判斷（Mulligan）**：自動開局抽牌後檢查是否有基礎寶可夢，沒有則彈出確認視窗顯示 7 張手牌，點擊確認後重新洗牌抽取
            - **有基礎寶可夢時自動放置獎勵卡**：確認起手有基礎寶可夢後，自動放置 6 張獎勵卡
            - **牌組編輯器拖曳支援**：牌組清單中的卡片可拖曳出去移除（-1），卡片清單中的卡片可拖曳進牌組清單新增（+1）
            - **解析度設定**：設定視窗新增解析度調整功能，含 5 秒確認倒數防止誤操作
            - **模式選擇頁面設定按鈕**：不需進入遊戲也能調整設定

            #### 修復
            - **備戰區卡片交換**：備戰區之間拖曳卡片現在正確交換整組（主區+附加區），不再把目標區卡片擠到附加區
            - **全螢幕適應**：遊戲畫面自動縮放適應不同解析度，手牌區和側邊按鈕不再被遮擋
            - **拖曳閃退防護**：延遲 overlay 重繪、保留 drag preview 元素、渲染進程崩潰自動恢復
            - **連線模式卡片圖片**：修復對手端無法顯示卡片圖片的問題（cardId 同步 + 正確 URL 生成）
            - **牌組編輯器搜尋/篩選**：清除搜尋文字後正確恢復所有卡片
            - **牌組編輯器版本切換**：切換卡片版本時選取不再跳回第一張

            #### UI 改善
            - 下拉選單美化（自訂樣式取代系統預設）
            - 篩選列布局重新排列
            - 視窗開關動畫效果
            - 牌組編輯器關閉時清除所有快取
            </details>

            ### 📥 下載說明

            | 檔案 | 說明 |
            |------|------|
            | `PTCG-Simulator-Portable-*.exe` | **Windows** — 直接執行 |
            | `*-x64.zip` | **macOS Intel** — 解壓後執行 |
            | `*-arm64.zip` | **macOS Apple Silicon (M1/M2/M3/M4)** — 解壓後執行 |
            | `PTCG-Card-Images.zip` | **卡片圖片（選用）** — 離線使用 |

            🌐 **網頁版**：https://jccjcctw.github.io/PTCG-Simulator-Web/

            ### 🖼️ 關於卡片圖片
            - 程式預設使用**線上圖片**，不需要額外下載即可正常使用
            - 如果想要**離線使用**，下載 `PTCG-Card-Images.zip` 並解壓到程式同目錄的 `images` 資料夾

            ### ⚠️ macOS 首次開啟
            1. 解壓縮 zip 檔案
            2. 對 `PTCG Simulator.app` **右鍵 → 打開**
            3. 彈出「無法驗證開發者」提示時，點擊 **打開**
            4. 之後即可直接雙擊開啟（只需操作一次）

            > 如果顯示「檔案已損毀」，請開啟終端機執行：
            > `xattr -cr "/path/to/PTCG Simulator.app"`

            ### ⚠️ Windows 注意事項
            - 可能跳出 SmartScreen 警告，點擊「仍要執行」即可
          files: artifacts/**/*
          draft: false
          prerelease: false
