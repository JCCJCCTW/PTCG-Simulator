name: Build & Release

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Build platform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - mac
          - windows
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        default: '1.4.0'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-mac:
    if: ${{ inputs.platform == 'mac' || inputs.platform == 'all' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build macOS (x64 + arm64)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --mac --publish never

      - name: Ad-hoc sign, add launcher, and repackage
        run: |
          for zipfile in dist/*.zip; do
            [ -f "$zipfile" ] || continue
            tmpdir=$(mktemp -d)
            unzip -q "$zipfile" -d "$tmpdir"
            app=$(find "$tmpdir" -name "*.app" -maxdepth 2 -type d | head -1)
            appname=$(basename "$app" 2>/dev/null || echo "PTCG Simulator.app")
            if [ -n "$app" ]; then
              xattr -cr "$app" 2>/dev/null || true
              codesign --force --deep -s - "$app" 2>/dev/null || true
            fi
            # 建立一鍵啟動腳本（雙擊即可，不需手動開終端機）
            cat > "$tmpdir/首次啟動請雙擊我.command" << 'SCRIPT'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          APP="$(find "$DIR" -name "*.app" -maxdepth 1 -type d | head -1)"
          if [ -z "$APP" ]; then
            echo "找不到 .app 檔案，請確認 .app 和此腳本在同一個資料夾"
            read -p "按 Enter 關閉..."
            exit 1
          fi
          echo "正在解除 macOS 安全限制..."
          xattr -cr "$APP" 2>/dev/null
          echo "正在啟動 $(basename "$APP")..."
          open "$APP"
          echo "完成！之後可以直接雙擊 .app 開啟，不需要再執行此腳本。"
          sleep 2
          SCRIPT
            chmod +x "$tmpdir/首次啟動請雙擊我.command"
            rm "$zipfile"
            cd "$tmpdir" && zip -r -q -y "$OLDPWD/$zipfile" . && cd "$OLDPWD"
            rm -rf "$tmpdir"
          done

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PTCG-Simulator-macOS
          path: |
            dist/*.zip
            dist/*.dmg

  build-windows:
    if: ${{ inputs.platform == 'windows' || inputs.platform == 'all' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Windows
        run: npx electron-builder --win --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PTCG-Simulator-Windows
          path: dist/*.exe

  release:
    needs: [build-mac, build-windows]
    if: ${{ always() && (needs.build-mac.result == 'success' || needs.build-windows.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: images
          sparse-checkout-cone-mode: true

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package images separately
        run: |
          cd images
          zip -r -9 ../artifacts/PTCG-Card-Images.zip . -x ".*"

      - name: List release files
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: PTCG Simulator v${{ inputs.version }}
          body: |
            ## PTCG 寶可夢卡牌模擬器 v${{ inputs.version }}

            ### ✨ v1.4.0 更新內容

            #### 新功能
            - **回合系統**：新增回合追蹤與「結束回合」按鈕，回合切換時自動抽一張牌
            - **攻擊系統**：戰鬥區寶可夢右鍵選擇「攻擊」→ 招式選擇面板 → 使用招式廣播 → 自動結束回合
            - **狀態效果**：支援中毒（每回合 10 傷害）、灼傷（擲幣：反面 20 傷害）、睡眠（擲幣：正面治癒）、麻痺（回合結束自動治癒，阻擋攻擊/撤退）、混亂（攻擊前擲幣：反面自傷 30）
            - **回合間結算**：回合交替時自動結算中毒/灼傷/睡眠等狀態效果
            - **起手設置階段**：抽到基礎寶可夢後進入設置階段，基礎寶可夢綠色高亮、非基礎卡片半透明
            - **設置放置規則**：設置階段僅能放置基礎寶可夢，戰鬥區必須先放置才能放備戰區
            - **設置完成按鈕**：雙方分別點擊「設置完成」後各自放置 6 張獎勵卡
            - **補抽階段**：設置完成後根據重抽次數差補抽卡片（強制視窗，顯示雙方重抽次數）
            - **牌組驗證**：支援 ptcg.tw 等外部匯入牌組，資料庫中找不到的卡片跳過重抽/獎勵判定

            #### 修復
            - **招式選擇視窗**：修正面板高度異常撐滿畫面的問題
            - **攻擊廣播文字**：修正文字過長換行問題
            - **起手拖曳鎖定**：抽牌動畫期間鎖定卡片拖曳

            #### 改善
            - **單人模式**：可操作雙方回合（結束回合、攻擊）
            - **多人模式同步**：攻擊、結束回合、設置完成皆透過 PeerJS 同步

            ---

            <details>
            <summary>v1.3.0 更新內容</summary>

            #### 修復
            - **多人模式重抽（Mulligan）修復**：修復對手端無限重抽的問題
            - **重抽結果顯示**：起手成功時不再顯示多餘的「起手成功」提示
            - **重抽安全上限**：新增 MAX_MULLIGAN (50) 防止無限重抽迴圈

            #### 改善
            - **視窗標題保持不變**：開啟牌組編輯器時標題不再改變
            - **卡片圖片本地優先**：優先從本地載入，找不到才使用線上圖片
            </details>

            <details>
            <summary>v1.2.0 更新內容</summary>

            #### 新功能
            - **起手重抽判斷（Mulligan）**
            - **牌組編輯器拖曳支援**
            - **解析度設定**
            - **模式選擇頁面設定按鈕**

            #### 修復
            - 備戰區卡片交換、全螢幕適應、拖曳閃退防護、連線模式卡片圖片等
            </details>

            ### 📥 下載說明

            | 檔案 | 說明 |
            |------|------|
            | `PTCG-Simulator.exe` | **Windows** — 直接執行 |
            | `*-x64.zip` | **macOS Intel** — 解壓後執行 |
            | `*-arm64.zip` | **macOS Apple Silicon (M1/M2/M3/M4)** — 解壓後執行 |
            | `PTCG-Card-Images.zip` | **卡片圖片（選用）** — 離線使用 |

            🌐 **網頁版**：https://jccjcctw.github.io/PTCG-Simulator-Web/

            ### 🖼️ 關於卡片圖片
            - 程式預設使用**線上圖片**，不需要額外下載即可正常使用
            - 如果想要**離線使用**，下載 `PTCG-Card-Images.zip` 並解壓到程式同目錄的 `images` 資料夾

            ### ⚠️ macOS 首次開啟
            1. 解壓縮 zip 檔案
            2. 對 `PTCG Simulator.app` **右鍵 → 打開**
            3. 彈出「無法驗證開發者」提示時，點擊 **打開**
            4. 之後即可直接雙擊開啟（只需操作一次）

            > 如果顯示「檔案已損毀」，請開啟終端機執行：
            > `xattr -cr "/path/to/PTCG Simulator.app"`

            ### ⚠️ Windows 注意事項
            - 可能跳出 SmartScreen 警告，點擊「仍要執行」即可
          files: artifacts/**/*
          draft: false
          prerelease: false
