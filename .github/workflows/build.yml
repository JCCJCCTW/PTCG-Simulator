name: Build & Release

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Build platform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - mac
          - windows
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        default: '1.1.0'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-mac:
    if: ${{ inputs.platform == 'mac' || inputs.platform == 'all' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build macOS (x64 + arm64)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --mac --publish never

      - name: Ad-hoc sign, add launcher, and repackage
        run: |
          for zipfile in dist/*.zip; do
            [ -f "$zipfile" ] || continue
            tmpdir=$(mktemp -d)
            unzip -q "$zipfile" -d "$tmpdir"
            app=$(find "$tmpdir" -name "*.app" -maxdepth 2 -type d | head -1)
            appname=$(basename "$app" 2>/dev/null || echo "PTCG Simulator.app")
            if [ -n "$app" ]; then
              xattr -cr "$app" 2>/dev/null || true
              codesign --force --deep -s - "$app" 2>/dev/null || true
            fi
            # 建立一鍵啟動腳本（雙擊即可，不需手動開終端機）
            cat > "$tmpdir/首次啟動請雙擊我.command" << 'SCRIPT'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          APP="$(find "$DIR" -name "*.app" -maxdepth 1 -type d | head -1)"
          if [ -z "$APP" ]; then
            echo "找不到 .app 檔案，請確認 .app 和此腳本在同一個資料夾"
            read -p "按 Enter 關閉..."
            exit 1
          fi
          echo "正在解除 macOS 安全限制..."
          xattr -cr "$APP" 2>/dev/null
          echo "正在啟動 $(basename "$APP")..."
          open "$APP"
          echo "完成！之後可以直接雙擊 .app 開啟，不需要再執行此腳本。"
          sleep 2
          SCRIPT
            chmod +x "$tmpdir/首次啟動請雙擊我.command"
            rm "$zipfile"
            cd "$tmpdir" && zip -r -q -y "$OLDPWD/$zipfile" . && cd "$OLDPWD"
            rm -rf "$tmpdir"
          done

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PTCG-Simulator-macOS
          path: |
            dist/*.zip
            dist/*.dmg

  build-windows:
    if: ${{ inputs.platform == 'windows' || inputs.platform == 'all' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Windows
        run: npx electron-builder --win --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PTCG-Simulator-Windows
          path: dist/*.exe

  release:
    needs: [build-mac, build-windows]
    if: ${{ always() && (needs.build-mac.result == 'success' || needs.build-windows.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: images
          sparse-checkout-cone-mode: true

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package images separately
        run: |
          cd images
          zip -r -9 ../artifacts/PTCG-Card-Images.zip . -x ".*"

      - name: List release files
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: PTCG Simulator v${{ inputs.version }}
          body: |
            ## PTCG 寶可夢卡牌模擬器 v${{ inputs.version }}

            ### 📥 下載說明

            | 檔案 | 說明 |
            |------|------|
            | `PTCG-Simulator-Portable-*.exe` | **Windows** — 直接執行 |
            | `*-x64.zip` | **macOS Intel** — 解壓後執行 |
            | `*-arm64.zip` | **macOS Apple Silicon (M1/M2/M3/M4)** — 解壓後執行 |
            | `PTCG-Card-Images.zip*` | **卡片圖片（選用）** — 離線使用用 |

            ### 🖼️ 關於卡片圖片
            - 程式預設使用**線上圖片**，不需要額外下載即可正常使用
            - 如果想要**離線使用**，下載 `PTCG-Card-Images.zip` 並解壓到程式同目錄的 `images` 資料夾

            ### ⚠️ macOS 注意事項
            解壓後**首次啟動**請雙擊 `首次啟動請雙擊我.command`，它會自動解除安全限制並啟動程式。
            之後就可以直接雙擊 `.app` 開啟，不需要再執行腳本。

            ### ⚠️ Windows 注意事項
            - 可能跳出 SmartScreen 警告，點擊「仍要執行」即可
          files: artifacts/**/*
          draft: false
          prerelease: false
